version: 0.4.0
vars: {}
graph:
  id: url_summarize
  description: 爬取URL内容并总结
  is_majority_voting: false
  log_level: INFO
  start:
    - Web Fetcher
  nodes:
    - id: Web Fetcher
      type: agent
      config:
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        name: gpt-4o
        role: |
          你是网页内容抓取助手。你的任务是从URL提取内容。
          
          [关键指令]
          1. 必须使用 read_webpage_content 工具来抓取网页
          2. URL格式: {"url": "https://example.com"}
          3. 返回提取的内容
        tooling:
          - type: function
            config:
              auto_load: true
              tools:
                - name: web:All
    - id: Content Summarizer
      type: agent
      config:
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        name: gpt-4o
        role: |
          总结网页内容。
          
          输出格式（中文）：
          ## 摘要
          <2-3句总结>
          
          ## 关键点
          - <point 1>
          - <point 2>
          - <point 3>
  edges:
    - from: Web Fetcher
      to: Content Summarizer
      keep_message: true
