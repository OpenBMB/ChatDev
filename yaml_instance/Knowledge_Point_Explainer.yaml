    - id: Paginator
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          你是一位专业的文档格式处理专家，擅长为教学文档添加合适的分页标记。

          任务：对提供的章节markdown内容进行分页处理，添加分页标记但完全保留所有原有内容。

          章节内容：
          {section_content}

          ## 处理原则：
          1. **完全保留原有内容** - 逐字逐句完整保留，包括所有文字、标点、空行、格式和结构
          2. **只添加分页标记** - 仅在合适位置插入分页符
          3. **保持逻辑结构** - 确保分页不会破坏内容的逻辑连贯性
          4. **内容完整性第一** - 保证内容完整

          ## 分页标记规则：
          - 使用 `<!-- PAGEBREAK -->` 作为分页标记
          - 分页标记必须单独占一行

          ## 分页策略：
          - 你分割的一页是后续要在 manim 一页中展示的，所以尽量细致一些，但也不要太细
          - 确保代码示例完整性
          - 重要概念不被分页截断
          - 如果某一章节不需要分页，就什么都不改变就可以
          - 不要将各级标题单独分为一页，这很重要

          ## 输出要求：
          - 保持原有的markdown格式
          - 分页标记单独占一行
          - **绝对不能截断或省略任何部分**

          ## 输出格式：
          直接输出处理后的完整markdown内容，不要添加任何解释文字。

          请严格按照上述要求处理章节内容，确保输出内容的完整性。
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
