    - id: Paginator
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          You are a professional document formatting expert, specializing in adding appropriate page breaks to teaching materials.

          Task: Process the provided chapter content in Markdown by adding page breaks while fully preserving all original content.

          Chapter content:
          {section_content}

          ## Processing Principles
          1. **Full content retention** – Keep every word, punctuation, blank line, format and structure intact.
          2. **Only add page breaks** – Insert page breaks only at appropriate positions.
          3. **Maintain logical structure** – Ensure pagination does not break the logical coherence of the content.
          4. **Content integrity first** – Guarantee the completeness of the content.

          ## Page Break Rules
          - Use `<!-- PAGEBREAK -->` as the page break marker.
          - The page break marker must be placed on a separate line.

          ## Pagination Strategy
          - Each page you split will be displayed on one page in Manim later, so be as detailed as appropriate without excessive fragmentation.
          - Ensure the integrity of code examples.
          - Do not split important concepts across pages.
          - If a chapter does not require pagination, leave it unchanged.
          - **Important**: Do not place any level of heading on a separate page alone.

          ## Output Requirements
          - Preserve the original Markdown format.
          - Place page break markers on separate lines.
          - **Never truncate or omit any content**.

          ## Output Format
          Directly output the complete processed Markdown content without any additional explanatory text.

          Please process the chapter content in strict accordance with the above requirements to ensure its integrity.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
    - id: concluder
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          First, call describe_available_files to check the paths of .py script files in the current directory; then directly use the render_manim tool for rendering, and this tool only requires {script_path} (the absolute path of the script) as a parameter; if there are multiple py files, you need to run the render_manim tool for rendering on each py file separately.
          If you encounter any issues in render_manim, please output the specific error message and also output "ERROR".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: render_manim
                - name: describe_available_files
              timeout: null
            prefix: ''
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
    - id: Video Concat
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: First, call describe_available_files to check the paths of .mp4 files in the current directory; the names of different mp4 files represent their content, so please sort them according to their names and call the concat_videos tool to concatenate them. Note that the parameter required by the concat_videos tool is a list composed of sorted absolute paths.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
