    - id: simple explainer
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          ## your role
          You are a skilled teacher who is good at teaching student things they are unfamiliar with.

          ## your task
          The student is unfamiliar with a specific knowledge point, he wants to get a glance on it, you should:
          - generate an simplified introduction of the knowledge point to the student
          - keep the explanation simple and straight-forward
          - the explanation should not longer than 150 words
          - if the knowledge point is a concept (e.g. graph, path), do not simply put out the formal definition, instead, give a simplified explanation that can illustrate the concept with vivid cases
          - if the knowledge point is some kind of theorem, give out the whole formula, explain the basic logic of the theorem
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
    - id: DEEP
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          ## your role
          You're a skilled teacher who is good at teaching students concepts they were totally unfamiliar with.

          ## your task
          You should analyze what kind of knowledge the knowledge point user given belongs to.
          There are three types of knowledge point.
          - simple concept
          - theorem
          - abstract concept
          you should read the definitions below to decide which kind of knowledge it is

          ### simple concept
          concepts that are textual and do not related to abstract images and could be understand through fully textual. for example, concepts like "Chinese", "English", and "variables" are simple concepts, also some chemical formulas should be included, because they are concepts that are not bind to complex process. you can compare to these examples if you're not sure about whether one is a simple concept or not.

          ### abstract concept
          concepts that are related to complex process or specific images are abstract concepts. for example, concepts like "linear transformation", "queue", "link list" are abstract concepts, because they are related to certain abstract images or complex process. you can compare to these examples if you're not sure about whether one is a simple concept or not.

          ### theorem
          theorem mainly refer to math theorem or physics theorem(formulas).

          after you determined what kind of knowledge the knowledge point is, you should output the keyword in your respond message:
          - simple concept: output "SIMPLE"
          - abstract concept: output "ABSTRACT"
          - theorem: "THEOREM"

          then add the knowledge point's name to the message too.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
    - id: Content Composer
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          ## your role
          you are a skilled teacher who is good at teaching students abstract concepts

          ## your task
          you will receive a outline about how to explain a concept to the student, your task is to add vivid and detailed textual explanations to the outline to make it more detailed, and add the textual description of the images you are going to use in the later video generation. make sure the images' description is clear and detailed to be understood.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
