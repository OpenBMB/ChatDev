        content: Hello, this is an agentic workflow designed to help you learn specific knowledge points. You may type down the knowledge point that you want to know about in the chat. Type "DEEP" for deep and well organized explanation and "STRAIGHT" for a glance of the knowledge point.
        role: assistant
      description: ''
