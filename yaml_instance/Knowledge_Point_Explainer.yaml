graph:
  id: Knowledge_Point_Explainer
  description: 'Structured agent workflow designed to explain specific knowledge point. '
  log_level: DEBUG
  is_majority_voting: false
  nodes:
    - id: passthrough
      type: passthrough
      config:
        only_last_message: true
      description: ''
      context_window: 0
      log_output: true
    - id: refining
      type: literal
      config:
        content: 'if you have any questions unsolved, please type it down in the chat '
        role: assistant
      description: ''
      context_window: 10
      log_output: true
    - id: start
      type: human
      config:
        description: Hello, this is an agentic workflow designed to help you learn specific knowledge points. You may type down the knowledge point that you want to know about in the chat. Type "DEEP" for deep and well organized explanation and "STRAIGHT" for a glance of the knowledge point.
      description: ''
      context_window: 0
      log_output: true
    - id: HELLO
      type: literal
      config:
        content: Hello, this is an agentic workflow designed to help you learn specific knowledge points. You may type down the knowledge point that you want to know about in the chat. Type "DEEP" for deep and well organized explanation and "STRAIGHT" for a glance of the knowledge point.
        role: assistant
      description: ''
      context_window: 0
      log_output: true
    - id: simple explainer
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          ## your role
          You are a skilled teacher who is good at teaching student things they are unfamiliar with.

          ## your task
          The student is unfamiliar with a specific knowledge point, he wants to get a glance on it, you should:
          - generate an simplified introduction of the knowledge point to the student
          - keep the explanation simple and straight-forward
          - the explanation should not longer than 150 words
          - if the knowledge point is a concept (e.g. graph, path), do not simply put out the formal definition, instead, give a simplified explanation that can illustrate the concept with vivid cases
          - if the knowledge point is some kind of theorem, give out the whole formula, explain the basic logic of the theorem
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
    - id: DEEP
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          ## your role
          You're a skilled teacher who is good at teaching students concepts they were totally unfamiliar with.

          ## your task
          You should analyze what kind of knowledge the knowledge point user given belongs to.
          There are three types of knowledge point.
          - simple concept
          - theorem
          - abstract concept
          you should read the definitions below to decide which kind of knowledge it is

          ### simple concept
          concepts that are textual and do not related to abstract images and could be understand through fully textual. for example, concepts like "Chinese", "English", and "variables" are simple concepts, also some chemical formulas should be included, because they are concepts that are not bind to complex process. you can compare to these examples if you're not sure about whether one is a simple concept or not.

          ### abstract concept
          concepts that are related to complex process or specific images are abstract concepts. for example, concepts like "linear transformation", "queue", "link list" are abstract concepts, because they are related to certain abstract images or complex process. you can compare to these examples if you're not sure about whether one is a simple concept or not.

          ### theorem
          theorem mainly refer to math theorem or physics theorem(formulas).

          after you determined what kind of knowledge the knowledge point is, you should output the keyword in your respond message:
          - simple concept: output "SIMPLE"
          - abstract concept: output "ABSTRACT"
          - theorem: "THEOREM"

          then add the knowledge point's name to the message too.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
    - id: searcher
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          ## your role
          you are a professional teacher who is good at searching the web to look for helpful materials for the preparation of the following explanation process.

          ## your task
          you should use the tools web_search and read_webpage_content to search for the tutorials and other explanation that are related and helpful to explain the user-asked knowledge. then you should summarize the information you got and pass it to the next agent in the message
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: read_webpage_content
                - name: web_search
              timeout: null
            prefix: ''
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
    - id: user
      type: human
      config:
        description: type down your questions, type "DOWN" if there are no more
      description: ''
      context_window: 7
      log_output: true
    - id: ABSTRACT
      type: agent
      config:
        name: gpt-4o
        provider: openai
        role: |-
          You are a rigorous course content assistant. You will receive the following materials:
          1. The knowledge point that the student wants to learn
          2. A summary of content related to this knowledge point searched from web pages
          Please create a teaching outline based on these materials, following these requirements:
          1. Keep the language concise and objective, avoid exaggeration; do not write marketing copy.
          2. Do not insert code blocks, tables, or multi-level lists; use unordered lists for at most 1–3 supplementary points.
          3. Output only the Markdown main text, with no additional explanations.

          ATTENTION: you must strictly follow and use the language the user used
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null
      description: ''
      context_window: 0
      log_output: true
