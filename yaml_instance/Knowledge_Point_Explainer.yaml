          Please create a teaching outline based on these materials, following these requirements:
          1. Keep the language concise and objective, avoid exaggeration; do not write marketing copy.
          2. Do not insert code blocks, tables, or multi-level lists; you may use bullet points for at most 1–3 supplementary points.
          3. Output only the Markdown main text, with no additional explanations.
          ATTENTION: you must strictly follow and use the language the user used

          ATTENTION: you must strictly follow and use the language the user used
        base_url: ${BASE_URL}
